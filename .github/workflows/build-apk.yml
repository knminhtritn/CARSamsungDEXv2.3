name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Show project files
        run: |
          echo "Current folder:"
          pwd
          echo "Root files:"
          ls -la
          echo "Project folders:"
          find . -maxdepth 3 -type d | sort

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: gradle :app:assembleDebug --stacktrace

      - name: Find and copy APK
        run: |
          echo "Searching APK files..."
          find . -name "*.apk" -type f -print
          APK_FILE=$(find . -name "*.apk" -type f | head -n 1)
          if [ -z "$APK_FILE" ]; then
            echo "ERROR: No APK file found after build."
            exit 1
          fi
          mkdir -p apk-output
          cp "$APK_FILE" apk-output/VF3DexOpenDashboard-debug.apk
          echo "Copied APK from: $APK_FILE"
          ls -la apk-output

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: VF3DexOpenDashboard-debug-apk
          path: apk-output/VF3DexOpenDashboard-debug.apk
          if-no-files-found: error
